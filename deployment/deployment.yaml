apiVersion: apps/v1
kind: Deployment

metadata:
  name: webapp
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp

    spec:

      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: webapp

          image: 513616569996.dkr.ecr.eu-north-1.amazonaws.com/cicd-repo:master-b0c8a64-17

          ports:
            - containerPort: 8080
