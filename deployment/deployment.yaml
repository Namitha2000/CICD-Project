apiVersion: apps/v1
kind: Deployment

metadata:
  name: webapp
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp

    spec:

      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: webapp

          image: IMAGE_PLACEHOLDER

          ports:
            - containerPort: 8080
